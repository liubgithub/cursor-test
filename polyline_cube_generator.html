            padding: 15px;

            z-index: 100;

            background: #fafbfc;

        button {

            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        button:hover {
            background: #0075ff;
        }
        
        button.danger {
            background: #f44336;
        }
        
        button.danger:hover {
            background: #da190b;
        }
        
        input[type="range"] {
            width: 100px;
            margin: 5px;
        }
        
        .control-group {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        .control-group h4 {
            margin: 0 0 10px 0;
            color: #0075ff;
        }
        
        label {
            display: inline-block;
            font-size: 12px;
        }
        
        .value-display {
            color: #0075ff;
            font-weight: bold;
        }
        
        input[type="checkbox"] {
            margin-right: 8px;
            transform: scale(1.2);
        }
        
        label {
            cursor: pointer;
            user-select: none;
        }
        #selectJiaoti {
            width: 20px;height: 20px;
            background-image: url('./images/select.png');
            cursor: pointer;
            background-size: cover;
        }
        /* #startCSGBtn {
            width: 100px;height: 25px;
            cursor: pointer;
            background-size: cover;
        } */
        label {
            line-height: 20px;
        }
        
        .view-item {
            padding: 8px;
            margin: 5px 0;
            background: #f5f5f5;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        
        .view-item:hover {
            background: #e0e0e0;
        }
        
        .view-item.active {
            background: #0075ff;
            color: white;
        }
        
        .view-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .view-item-name {
            font-weight: bold;
        }
        
        .view-item-delete {
            background: #f44336;
            color: white;
            border: none;
            padding: 2px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
        }
        
        .view-item-delete:hover {
            background: #da190b;
        }
        
        /* 加载遮罩样式 */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        #loadingOverlay.show {
            display: flex;
        }
        
        .loading-content {
            background: white;
            padding: 30px 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0075ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #333;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>

                if (points3DData.length < 2) return;

                // 生成连续的半圆柱体几何体
                const geometry = this.createContinuousGeometry(points3DData, width, height, direction);
                
                if (geometry) {
                    const material = inputMaterial || glueMaterial;
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    // 根据显示状态决定是否添加到场景
                    if (this.showContinuousGeometry) {
                        this.scene.add(mesh);
                    }
                    cylinderMeshes.push(mesh);
                }
                return cylinderMeshes;
            }

            // 创建连续的半圆柱体几何体
            createContinuousGeometry(points3DData, width, height, direction) {
                const vertices = [];
                const indices = [];
                const normals = [];
                
                // 为每个点创建半圆形横截面
                const crossSections = [];
                
                for (let i = 0; i < points3DData.length; i++) {
                    const point = points3DData[i];
                    const crossSection = this.createCrossSection(point, i, points3DData, width, height, direction);
                    crossSections.push(crossSection);
                }
                
                // 生成顶点
                let vertexIndex = 0;
                for (let i = 0; i < crossSections.length; i++) {
                    const crossSection = crossSections[i];
                    for (let j = 0; j < crossSection.length; j++) {
                        const deltaHeight = crossSection[j].y - gluePlaneWorldY;
                        const y = deltaHeight <= this.pillarHeight ? crossSection[j].y : gluePlaneWorldY + this.pillarHeight;
                        vertices.push(crossSection[j].x, y, crossSection[j].z);
                        // vertices.push(crossSection[j].x, crossSection[j].y, crossSection[j].z);
                        normals.push(0, 0, 0); // 稍后计算
                    }
                }
                
                // 生成侧面索引
                for (let i = 0; i < crossSections.length - 1; i++) {
                    const currentSection = crossSections[i];
                    const nextSection = crossSections[i + 1];
                    
                    for (let j = 0; j < currentSection.length - 1; j++) {
                        // 当前截面的顶点索引
                        const v1 = i * currentSection.length + j;
                        const v2 = i * currentSection.length + j + 1;
                        const v3 = (i + 1) * currentSection.length + j;
                        const v4 = (i + 1) * currentSection.length + j + 1;
                        
                        // 创建两个三角形
                        indices.push(v1, v3, v2);
                        indices.push(v2, v3, v4);
                    }
                }
                
                // 生成端面
                this.addEndCaps(indices, crossSections);
                
                // 创建几何体
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                geometry.setIndex(indices);
                
                // 计算法线
                geometry.computeVertexNormals();
                
                return geometry;
            }

            // 创建半圆形横截面
            createCrossSection(point, index, points3DData, width, height, direction) {
                const crossSection = [];
                
                // 将输入点安全地转换为 THREE.Vector3
                // 由于点数据已经从middleLine提取并转换到世界坐标，直接使用即可
                const toVec3 = (p) => {
                    return new THREE.Vector3(p.x, p.y, p.z);
                };
                const curr = toVec3(points3DData[index]);
                const prev = index > 0 ? toVec3(points3DData[index - 1]) : null;
                const next = index < points3DData.length - 1 ? toVec3(points3DData[index + 1]) : null;
                
                // 计算当前点的切线方向
                let tangent = new THREE.Vector3();
                if (!prev && next) {
                    tangent.subVectors(next, curr);
                } else if (prev && !next) {
                    tangent.subVectors(curr, prev);
                } else if (prev && next) {
                    const forward = new THREE.Vector3().subVectors(next, curr);
                    const backward = new THREE.Vector3().subVectors(curr, prev);
                    tangent.addVectors(forward, backward).multiplyScalar(0.5);
                }
                tangent.normalize();
                
                // 计算副法线（垂直于切线）
                const up = new THREE.Vector3(0, 1, 0);
                let binormal = new THREE.Vector3().crossVectors(tangent, up);
                
                // 如果副法线为零向量，使用另一个参考向量
                if (binormal.length() < 0.001) {
                    const right = new THREE.Vector3(1, 0, 0);
                    binormal.crossVectors(tangent, right);
                }
                
                binormal.normalize();
                
                // 计算法线（垂直于切线和副法线）
                const normal = new THREE.Vector3().crossVectors(binormal, tangent).normalize();
                
                // 创建椭圆横截面
                const horizontalRadius = width / 2; // 水平长轴半径
                const verticalRadius = height / 2; // 垂直短轴半径
                const segments = 16; // 椭圆的段数
                // 添加椭圆长轴的两个端点（底面边界）
                const leftPoint = curr.clone().add(binormal.clone().multiplyScalar(-horizontalRadius));
                const rightPoint = curr.clone().add(binormal.clone().multiplyScalar(horizontalRadius));
                crossSection.push(leftPoint);  // 左端点
                crossSection.push(rightPoint); // 右端点
                
                // 生成椭圆上的点（局部 x 沿 binormal，局部 y 沿 normal）
                for (let i = 0; i <= segments; i++) {
                    const angle = (i / segments) * Math.PI; // 0 到 π
                    const x = Math.cos(angle) * horizontalRadius; // 水平长轴
                    const y = Math.sin(angle) * verticalRadius * direction;   // 垂直短轴
                    
                    const offset = binormal.clone().multiplyScalar(x).add(normal.clone().multiplyScalar(y));
                    const worldPoint = curr.clone().add(offset);
                    crossSection.push(worldPoint);
                }
                
                return crossSection;
            }

            // 添加端面
            addEndCaps(indices, crossSections) {
                if (crossSections.length < 2) return;
                
                const firstSection = crossSections[0];
                const lastSection = crossSections[crossSections.length - 1];
                const verticesPerSection = firstSection.length;
                
                // 第一个端面（起始端）- 椭圆形端面
                // 索引0和1是长轴端点，索引2开始是椭圆弧点
                const diameterStart = 0; // 左端点
                const diameterEnd = 1;   // 右端点
                const arcStart = 2;       // 椭圆弧起点
                
                // 生成底面三角形（长轴 + 椭圆弧）
                for (let i = arcStart; i < verticesPerSection - 1; i++) {
                    // 三角形：左端点 -> 当前弧点 -> 下一个弧点
                    indices.push(diameterStart, i, i + 1);
                }
                // 最后一个三角形：左端点 -> 最后一个弧点 -> 右端点
                indices.push(diameterStart, verticesPerSection - 1, diameterEnd);
                
                // 最后一个端面（结束端）- 椭圆形端面
                const lastStartIndex = (crossSections.length - 1) * verticesPerSection;
                const lastDiameterStart = lastStartIndex + diameterStart;
                const lastDiameterEnd = lastStartIndex + diameterEnd;
                
                // 生成顶面三角形（逆时针，法线向外）
                for (let i = arcStart; i < verticesPerSection - 1; i++) {
                    // 三角形：左端点 -> 下一个弧点 -> 当前弧点
                    indices.push(lastDiameterStart, lastStartIndex + i + 1, lastStartIndex + i);
                }
                // 最后一个三角形：左端点 -> 右端点 -> 最后一个弧点
                indices.push(lastDiameterStart, lastDiameterEnd, lastStartIndex + verticesPerSection - 1);
            }

                if (!this.gltfBoxMesh) return;
                // 使用世界坐标系下的包围盒
                const worldBox = new THREE.Box3().setFromObject(this.gltfBoxMesh);
                const min = worldBox.min;
                const max = worldBox.max;
                // 四个面朝向盒子内部
                const planes = [
                    new THREE.Plane(new THREE.Vector3( 1, 0, 0), -min.x), // 左面 x = min.x, 法线 +X
                    new THREE.Plane(new THREE.Vector3(-1, 0, 0),  max.x), // 右面 x = max.x, 法线 -X
                    new THREE.Plane(new THREE.Vector3( 0, 0, 1), -min.z), // 前面 z = min.z, 法线 +Z
                    new THREE.Plane(new THREE.Vector3( 0, 0,-1),  max.z), // 后面 z = max.z, 法线 -Z
                ];
                this.clippingPlanes = planes;
                // 应用到胶体材质与现有胶体mesh
                if (glueMaterial && toClip) {
                    glueMaterial.clippingPlanes = planes;
                    glueMaterial.needsUpdate = true;
                } else {
                    glueMaterial.clippingPlanes = [];
                    glueMaterial.needsUpdate = true;
                }
                this.cylinderMeshes.forEach(m => {
                    if (m.material && toClip) {
                        m.material.clippingPlanes = planes;
                        m.material.needsUpdate = true;
                    } else {
                        m.material.clippingPlanes = [];
                        m.material.needsUpdate = true;
                    }
                });
            }

                    const baseY = slotWorldPos.y;
                    const height = Math.abs(gluePlaneWorldY - baseY);
                    if (height <= 0) return; // 若不在下面则不生成
                    
                    // 确保支撑柱足够高，能够延伸到圆柱体顶部
                    // 计算圆柱体的最大高度
                    // let maxCylinderHeight = 0;
                    // this.cylinderMeshes.forEach(cylinderMesh => {

            // 生成mesh的侧面并封闭，返回一个新的盒状体Mesh
            crateSideMesh(mesh, height, direction = 1) {
                
                // 原始复杂方法 - 暂时注释掉
                // 1. 获取mesh的顶面顶点
                const posAttr = mesh.geometry.attributes.position;
                const posCount = posAttr.count;
                // 收集顶面顶点
                let baseVertices = [];
                for (let i = 0; i < posCount; i++) {
                    const vertex = new THREE.Vector3().fromBufferAttribute(posAttr, i);
                    baseVertices.push(vertex);
                }

                // 2. 计算顶面法向量（假设平面水平，方向为0,1,0或0,-1,0）
                let normal = new THREE.Vector3();
                normal.set(0, 0, 1);

                // 3. 复制面顶点 并 沿法向移动height = 得到topVertices
                const directionVal = direction; // up or down
                const offsetVec = normal.clone().multiplyScalar(height * directionVal);
                // mesh2为top，mesh为base
                const topVertices = baseVertices.map(v => v.clone().add(offsetVec));

                // 4. 侧面三角面拼接
                // 假设顺序一致，首尾闭合
                let indices = [];
                const len = baseVertices.length;
                for (let i = 0; i < len; i++) {
                    // 底面相邻点i,i+1，与顶面对应点i,i+1
                    const j = (i + 1) % len;
                    const b0 = i;
                    const b1 = j;
                    const t0 = i + len;
                    const t1 = j + len;
                    // 2个三角面(i, j, t1), (i, t1, t0)
                    indices.push(b0, b1, t1);
                    indices.push(b0, t1, t0);
                }

                // 5. 封顶&封底（需要顶点顺序正确，保证法线朝外）
                // 使用三角扇方法，第一个顶点（索引0）是中心点

                function triangulateFace(vertexIndices, flip = false) {
                    const triangles = [];
                    const centerIndex = vertexIndices[0]; // 第一个顶点作为中心
                    
                    // 从索引1开始，因为索引0是中心点
                    for(let i = 1; i < vertexIndices.length - 1; i++) {
                        if(!flip) {
                            // 逆时针：center -> i -> i+1 (法线向外)
                            triangles.push(centerIndex, vertexIndices[i], vertexIndices[i + 1]);
                        } else {
                            // 顺时针：center -> i+1 -> i (法线向外)
                            triangles.push(centerIndex, vertexIndices[i + 1], vertexIndices[i]);
                        }
                    }
                    return triangles;
                }

                // 封底（base）法线向外 - 使用逆时针顺序
                const baseIndices = [...Array(len).keys()];
                indices.push(...triangulateFace(baseIndices, false));
                
                // 封顶（top）法线向外 - 重新生成顶部面
                const topIndices = [...Array(len).keys()].map(i => i + len);
                
                // 手动生成顶部面，确保正确的法线方向
                const topCenterIndex = topIndices[0]; // 顶部中心点
                for(let i = 1; i < topIndices.length - 1; i++) {
                    if (direction === 1) {
                        // 向上延伸，顶部面法线应该向上（逆时针）
                        indices.push(topCenterIndex, topIndices[i], topIndices[i + 1]);
                    } else {
                        // 向下延伸，顶部面法线应该向下（顺时针）
                        indices.push(topCenterIndex, topIndices[i + 1], topIndices[i]);
                    }
                }
                

                // 6. 合并所有顶点
                const allVertices = [...baseVertices, ...topVertices];
                const verticesArray = [];
                allVertices.forEach(v => {
                    verticesArray.push(v.x, v.y, v.z);
                });
                // 7. 生成BufferGeometry
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(verticesArray, 3));
                geometry.setIndex(indices);
                
                // 重新计算法线，确保正确
                geometry.computeVertexNormals();
                
                // 验证几何体
                if (geometry.attributes.position.count === 0) {
                    console.error('几何体顶点数为0');
                    return null;
                }
                if (geometry.index && geometry.index.count === 0) {
                    console.error('几何体索引数为0');
                    return null;
                }
                
                
                // 验证几何体是否为封闭的
                const isValidGeometry = this.validateGeometry(geometry);
                if (!isValidGeometry) {
                    console.warn('立柱体几何体可能不是封闭的，这可能导致CSG运算异常');
                }
                
                // 材质，继承mesh材质并设为半透明
                // const material = mesh.material.clone ? mesh.material.clone() : new THREE.MeshStandardMaterial({ color: 0x66cc44, transparent:true, opacity:0.7 });
                const material = new THREE.MeshStandardMaterial({ color: 0xffff00, transparent:true, opacity:0.7, side: THREE.DoubleSide });

                // 8. 构建mesh
                const sideMesh = new THREE.Mesh(geometry, material);
                sideMesh.castShadow = true;
                sideMesh.receiveShadow = true;
                sideMesh.scale.setScalar(wholeScale);
                sideMesh.rotation.set(3 * Math.PI / 2, 0, 0);
                // 基于sideMesh的包围盒生成一个包围盒Mesh供CSG用
                // 计算包围盒
                const boundingBox = new THREE.Box3().setFromObject(sideMesh);
                const boxSize = new THREE.Vector3();
                boundingBox.getSize(boxSize);
                const boxCenter = new THREE.Vector3();
                boundingBox.getCenter(boxCenter);

                // 用包围盒的尺寸和中心生成BoxGeometry和mesh
                const bboxGeometry = new THREE.BoxGeometry(boxSize.x, boxSize.y, boxSize.z);
                const bboxMaterial = direction === 1 ? glueMaterial : new THREE.MeshStandardMaterial({ color: 0xff0000, wireframe: false, transparent: true, opacity: 0.9 });
                const bboxMesh = new THREE.Mesh(bboxGeometry, bboxMaterial);
                bboxMesh.position.copy(boxCenter);
                bboxMesh.userData.id = mesh.userData.id;
                // bboxMesh.position.y -= 0.02;
                // 若立柱体有旋转，也将包围盒mesh设置相同旋转
                // bboxMesh.rotation.copy(sideMesh.rotation);
                // bboxMesh.scale.copy(sideMesh.scale);
                return bboxMesh;
                
            }

            // 验证几何体是否为封闭的
            validateGeometry(geometry) {
                if (!geometry.attributes.position || !geometry.index) {
                    return false;
                }
                
                const positionAttribute = geometry.attributes.position;
                const indexAttribute = geometry.index;
                
                // 检查是否有足够的顶点和索引
                if (positionAttribute.count < 4 || indexAttribute.count < 12) {
                    return false;
                }
                
                // 检查索引是否有效
                const maxIndex = Math.max(...Array.from(indexAttribute.array));
                if (maxIndex >= positionAttribute.count) {
                    console.warn(`几何体索引超出范围: maxIndex=${maxIndex}, vertexCount=${positionAttribute.count}`);
                    return false;
                }
                
                return true;
            }

            // CSG减法运算：使用pillarMeshes对cylinderMeshes进行减法运算
            performCSGSubtraction(from, target, method, needMergeMeshes) {
                try {           
                    let combinedCylinderGeometry = null;
                    // 合并所有圆柱体mesh为一个几何体
                    const cylinderGeometries = [];
                    for (let i = 0; i < target.length; i++) {
                        const mesh = target[i];
                        mesh.updateMatrixWorld();
                        const geometry = mesh.geometry.clone();
                        
                        // 确保几何体有索引
                        if (!geometry.index) {
                            geometry.setIndex(null);
                        }
                        
                        // 应用变换矩阵
                        geometry.applyMatrix4(mesh.matrixWorld);
                        
                        // 重新计算法线
                        geometry.computeVertexNormals();
                        
                        // 确保几何体是有效的
                        geometry.computeBoundingBox();
                        geometry.computeBoundingSphere();
                        
                        cylinderGeometries.push(geometry);
                    }
                    if (cylinderGeometries.length > 0) {
                        combinedCylinderGeometry = BufferGeometryUtils.mergeGeometries(cylinderGeometries);
                        if (combinedCylinderGeometry) {
                            combinedCylinderGeometry.computeVertexNormals();
                            combinedCylinderGeometry.computeBoundingBox();
                            combinedCylinderGeometry.computeBoundingSphere();
                        }
                    }
                    // 合并所有支撑柱mesh为一个几何体
                    const pillarGeometries = [];
                    for (let i = 0; i < from.length; i++) {
                        const mesh = from[i];
                        mesh.updateMatrixWorld();
                        const geometry = mesh.geometry.clone();
                        
                        // 确保几何体有索引
                        if (!geometry.index) {
                            geometry.setIndex(null);
                        }
                        
                        // 应用变换矩阵
                        geometry.applyMatrix4(mesh.matrixWorld);
                        
                        // 重新计算法线
                        geometry.computeVertexNormals();
                        
                        // 确保几何体是有效的
                        geometry.computeBoundingBox();
                        geometry.computeBoundingSphere();
                        
                        pillarGeometries.push(geometry);
                    }
                    
                    let combinedPillarGeometry = null;
                    if (pillarGeometries.length > 0) {
                        combinedPillarGeometry = BufferGeometryUtils.mergeGeometries(pillarGeometries);
                        if (combinedPillarGeometry) {
                            combinedPillarGeometry.computeVertexNormals();
                            combinedPillarGeometry.computeBoundingBox();
                            combinedPillarGeometry.computeBoundingSphere();
                        }
                    }
                    // 检查几何体是否有效
                    if (!combinedCylinderGeometry || !combinedCylinderGeometry.attributes.position) {
                        throw new Error('圆柱体几何体无效');
                    }
                    if (!combinedPillarGeometry || !combinedPillarGeometry.attributes.position) {
                        throw new Error('支撑柱几何体无效');
                    }
                    
                    // 计算几何体的边界框用于调试
                    const cylinderBox = new THREE.Box3().setFromBufferAttribute(combinedCylinderGeometry.attributes.position);
                    const pillarBox = new THREE.Box3().setFromBufferAttribute(combinedPillarGeometry.attributes.position);
                    
                    
                    // 检查两个几何体是否相交
                    const intersection = cylinderBox.intersectsBox(pillarBox);
                    
                    if (!intersection) {
                        console.warn('警告：圆柱体和支撑柱几何体在边界框层面不相交，CSG运算可能无效');
                        console.log('建议检查几何体的实际位置和大小');
                    }
                    
                    // 创建Evaluator实例，使用更保守的设置
                    const evaluator = new Evaluator();
                    evaluator.attributes = [ 'position', 'normal' ];
                    
                    // 设置更保守的CSG参数
                    evaluator.useGroups = false;
                    evaluator.verbose = true;
                    
                    // 创建Brush对象，确保几何体有效
                    const cylinderBrush = new Brush(combinedCylinderGeometry);
                    const pillarBrush = new Brush(combinedPillarGeometry);
                    
                    // 验证Brush对象
                    if (!cylinderBrush || !pillarBrush) {
                        throw new Error('Brush对象创建失败');
                    }
                    
                    // 执行减法运算
                    console.log('执行CSG减法运算...');
                    console.log('圆柱体顶点数:', combinedCylinderGeometry.attributes.position.count);
                    console.log('支撑柱顶点数:', combinedPillarGeometry.attributes.position.count);
                    
                    // 尝试执行CSG运算，如果失败则使用备用方案
                    let csgResult = null;
                    try {
                        csgResult = evaluator.evaluate(cylinderBrush, pillarBrush, method);
                    } catch (csgError) {
                        console.warn('CSG运算失败，尝试备用方案:', csgError);
                        // 备用方案：直接使用圆柱体几何体
                        csgResult = { geometry: combinedCylinderGeometry };
                    }
                    
                    // 将CSG结果转换为标准BufferGeometry
                    let resultGeometry = null;
                    if (csgResult && csgResult.geometry) {
                        resultGeometry = csgResult.geometry;
                    } else if (csgResult && csgResult.attributes) {
                        // 如果直接返回几何体数据，创建新的BufferGeometry
                        resultGeometry = new THREE.BufferGeometry();
                        if (csgResult.attributes.position) {
                            resultGeometry.setAttribute('position', csgResult.attributes.position);
                        }
                        if (csgResult.attributes.normal) {
                            resultGeometry.setAttribute('normal', csgResult.attributes.normal);
                        }
                        if (csgResult.index) {
                            resultGeometry.setIndex(csgResult.index);
                        }
                    } else {
                        throw new Error('CSG运算结果格式不正确');
                    }
                    
                    // 确保结果几何体有必要的属性
                    if (resultGeometry) {
                        // 清理morphAttributes
                        resultGeometry.morphAttributes = {};
                        
                        // 确保有正确的索引
                        if (!resultGeometry.index) {
                            resultGeometry.setIndex(null);
                        }
                        
                        // 重新计算法线以确保正确渲染
                        resultGeometry.computeVertexNormals();
                        
                        // 计算边界信息
                        resultGeometry.computeBoundingBox();
                        resultGeometry.computeBoundingSphere();
                        
                        // 验证几何体完整性
                        if (!resultGeometry.attributes.position || resultGeometry.attributes.position.count === 0) {
                            throw new Error('CSG结果几何体顶点数据无效');
                        }
                        
                        console.log('CSG结果几何体顶点数:', resultGeometry.attributes.position.count);
                        console.log('CSG结果几何体索引数:', resultGeometry.index ? resultGeometry.index.count : '无索引');
                    } else {
                        throw new Error('CSG运算结果为空');
                    }
                    
                    // 创建结果mesh
                    const resultMaterial = glueMaterial;
                    
                    const csgResultMesh = new THREE.Mesh(resultGeometry, resultMaterial);
                    csgResultMesh.castShadow = true;
                    csgResultMesh.receiveShadow = true;
                    
                    // 添加到场景
                    // this.scene.add(csgResultMesh);
                    return csgResultMesh;
                    
                    console.log('CSG减法运算完成');
                    
                } catch (error) {
                    console.error('CSG运算失败:', error);
                    alert('CSG运算失败: ' + error.message);
                }
            }

            // 加载模型A（点胶动画模型）
            loadAnimationModel() {
                return new Promise((resolve, reject) => {
                    // 如果已经加载过，直接返回
                    if (this.animationModel) {
                        resolve(this.animationModel);
                        return;
                    }

                    this.gltfLoader.load(
                        './gltf/drill/scene.gltf',
                        (gltf) => {
                            console.log('模型A载入成功:', gltf);
                            const model = gltf.scene;
                            
                            // 设置初始位置（路径起点）
                            if (this.points3DData.length > 0) {
                                // 点数据已经是世界坐标，直接使用
                                const startPoint = new THREE.Vector3(
                                    this.points3DData[0].x,
                                    this.points3DData[0].y,
                                    this.points3DData[0].z
                                );
                                model.position.copy(startPoint);
                            }
                            
                            // 设置缩放（根据实际需要调整）
                            model.scale.set(0.0001, 0.0001, 0.0001);
                            
                            // 启用阴影
                            model.traverse((child) => {
                                if (child.isMesh) {
                                    child.castShadow = true;
                                    child.receiveShadow = true;
                                }
                            });
                            
                            this.scene.add(model);
                            this.animationModel = model;
                            
                            // 如果有动画，创建动画混合器
                            if (gltf.animations && gltf.animations.length > 0) {
                                const mixer = new THREE.AnimationMixer(model);
                                gltf.animations.forEach((clip) => {
                                    mixer.clipAction(clip).play();
                                });
                                this.animationMixers.push(mixer);
                            }
                            
                            resolve(model);
                        },
                        (progress) => {
                            console.log('模型A载入进度:', (progress.loaded / progress.total * 100) + '%');
                        },
                        (error) => {
                            console.error('模型A载入失败:', error);
                            reject(error);
                        }
                    );
                });
            }

            // 启动点胶动画
            async startGlueAnimation() {
                // 检查是否有路径数据
                if (!this.points3DData || this.points3DData.length < 2) {
                    alert('请先加载3D点数据');
                    return;
                }

                // 检查是否已经有points3DLine
                if (!this.points3DLine) {
                    alert('请先选择点胶面并加载3D点数据');
                    return;
                }

                // 如果正在动画，先停止
                if (this.isAnimating) {
                    this.isAnimating = false;
                    return;
                }

                try {
                    // 加载模型A（如果还没加载）
                    if (!this.animationModel) {
                        await this.loadAnimationModel();
                    }

                    // 确保模型可见
                    this.animationModel.visible = true;

                    // 重置到起点（点数据已经是世界坐标，直接使用）
                    const startPoint = new THREE.Vector3(
                        this.points3DData[0].x,
                        this.points3DData[0].y,
                        this.points3DData[0].z
                    );
                    this.animationModel.position.copy(startPoint);

                    // 启动动画
                    this.isAnimating = true;
                    this.animationStartTime = performance.now();
                    this.animationProgress = 0;
                    
                    console.log('点胶动画开始');
                } catch (error) {
                    console.error('启动点胶动画失败:', error);
                    alert('启动点胶动画失败: ' + error.message);

            // 创建3D点线条
            create3DPointsLine() {
                // 清除现有线条
                if (this.points3DLine) {
                    this.scene.remove(this.points3DLine);
                }
                if (this.offsetLine) {
                    this.scene.remove(this.offsetLine);
                }

                if (this.points3DData.length < 2) {
                    console.warn('3D点数据不足，无法创建线条');
                    return;
                }

                // 创建原始线条几何体
                const geometry = new THREE.BufferGeometry();
                const vertices = new Float32Array(this.points3DData.length * 3);
                
                for (let i = 0; i < this.points3DData.length; i++) {
                    vertices[i * 3] = this.points3DData[i].x;
                    vertices[i * 3 + 1] = this.points3DData[i].y;
                    vertices[i * 3 + 2] = this.points3DData[i].z;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));

                // 创建原始线条材质
                const material = new THREE.LineBasicMaterial({ 
                    color: 0xff0000,  // 红色
                    linewidth: 2
                });

                // 创建原始线条对象
                this.points3DLine = new THREE.Line(geometry, material);
                this.points3DLine.rotation.x = -Math.PI / 2;
                this.points3DLine.scale.x = wholeScale;
                this.points3DLine.scale.y = wholeScale;
                this.points3DLine.scale.z = wholeScale;
                this.points3DLine.position.x = 0;
                this.points3DLine.position.y = 0;
                this.points3DLine.position.z = 0;
                
                // 根据显示状态决定是否添加到场景
                if (this.show3DPointsLine) {
                    this.scene.add(this.points3DLine);
                }
                this.points3DLine.updateWorldMatrix(true, false);
                
                // 创建向内缩小的线圈
                this.createOffsetLine();
                
                console.log('3D点线条创建完成');
            }

            // 创建向内缩小的线圈
            createOffsetLine() {
                if (this.points3DData.length < 3) {
                    console.warn('点数据不足，无法创建向内缩小线圈');
                    return;
                }

                // 先清除旧的向内缩小线圈
                if (this.offsetLine) {
                    this.scene.remove(this.offsetLine);
                    this.offsetLine.geometry.dispose();
                    this.offsetLine.material.dispose();
                    this.offsetLine = null;
                }

                // 计算向内缩小的点
                const offsetPoints = this.calculateOffsetPoints(this.points3DData, this.offsetDistance);
                const topOffsetPoints = this.calculateOffsetPoints(this.points3DData, -0.35);
                this.generateCylinders(offsetPoints, this.blueCylinderMeshes, this.blueWidth, this.blueHeight, -1);
                this.blueCylinderMeshes.forEach(mesh => {
                    mesh.visible = false;
                });
                this.topCylinderMeshes = [];
                this.generateCylinders(topOffsetPoints, this.topCylinderMeshes, this.blueWidth, this.blueWidth, 1, glueNoClipMaterial);
                this.topCylinderMeshes.forEach(mesh => {
                    mesh.visible = false;
                    mesh.position.y += 0.01425;
                });
            }
            // 计算向内缩小的点 - 简单直接的方法
            calculateOffsetPoints(points3DData, offsetDistance) {
                const offsetPoints = [];
                const center = this.calculateLineCenter(points3DData);
                
                for (let i = 0; i < points3DData.length; i++) {
                    const currentPoint = points3DData[i];
                    
                    // 计算从当前点到中心的向量
                    const toCenter = new THREE.Vector3(
                        center.x - currentPoint.x,
                        center.y - currentPoint.y,
                        center.z - currentPoint.z
                    );
                    
                    // 归一化
                    toCenter.normalize();
                    
                    // 向内移动
                    const offsetPoint = new THREE.Vector3(
                        currentPoint.x + toCenter.x * offsetDistance,
                        currentPoint.y + toCenter.y * offsetDistance,
                        currentPoint.z + toCenter.z * offsetDistance
                    );
                    
                    offsetPoints.push(offsetPoint);
                }
                
                return offsetPoints;
            }

            // 计算线圈的中心点
            calculateLineCenter(points3DData) {
                let centerX = 0, centerY = 0, centerZ = 0;
                
                for (let i = 0; i < points3DData.length; i++) {
                    centerX += points3DData[i].x;
                    centerY += points3DData[i].y;
                    centerZ += points3DData[i].z;
                }
                
                return {
                    x: centerX / points3DData.length,
                    y: centerY / points3DData.length,
                    z: centerZ / points3DData.length
                };
            }

            animate() {
                requestAnimationFrame(() => this.animate());      
                if (this.isFlying) {
                    const now = performance.now();
                    const t = Math.min(1, (now - this.flyStartTime) / this.flyDuration);
                    // ease in-out
                    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                    this.camera.position.lerpVectors(this.flyFromPos, this.flyToPos, ease);
                    const target = new THREE.Vector3().lerpVectors(this.flyFromTarget, this.flyToTarget, ease);
                    this.controls.target.copy(target);
                    this.controls.update();
                    if (t >= 1) this.isFlying = false;
                }
                
                // 更新点胶动画
                if (this.isAnimating && this.animationModel && this.points3DData.length > 0) {
                    const now = performance.now();
                    const elapsed = now - this.animationStartTime;
                    this.animationProgress = Math.min(1, elapsed / this.animationDuration);
                    
                    // 计算当前位置
                    const totalPoints = this.points3DData.length;
                    const currentIndex = Math.floor(this.animationProgress * (totalPoints - 1));
                    const nextIndex = Math.min(currentIndex + 1, totalPoints - 1);
                    const segmentProgress = (this.animationProgress * (totalPoints - 1)) - currentIndex;
                    
                    // 获取当前点和下一个点（点数据已经是世界坐标，直接使用）
                    const currentPoint = new THREE.Vector3(
                        this.points3DData[currentIndex].x,
                        this.points3DData[currentIndex].y,
                        this.points3DData[currentIndex].z
                    );
                    const nextPoint = new THREE.Vector3(
                        this.points3DData[nextIndex].x,
                        this.points3DData[nextIndex].y,
                        this.points3DData[nextIndex].z
                    );
                    
                    // 插值计算位置
                    const position = new THREE.Vector3().lerpVectors(currentPoint, nextPoint, segmentProgress);
                    this.animationModel.position.copy(position);
                    
                    // 计算方向（朝向运动方向）
                    if (nextIndex > currentIndex) {
                        const direction = new THREE.Vector3().subVectors(nextPoint, currentPoint).normalize();
                        if (direction.length() > 0.001) {
                            // 使用lookAt方法让模型朝向运动方向
                            const target = position.clone().add(direction);
                            this.animationModel.lookAt(target);
                        }
                    }
                    
                    // 动画结束
                    if (this.animationProgress >= 1) {
                        this.isAnimating = false;
                        console.log('点胶动画完成');
                    }
                }
                
                // 更新动画混合器
                this.updateAnimations(0.016);
                
                this.renderer.render(this.scene, this.camera);
            }

            // 计算一组mesh的包围盒
            getMeshesBox(meshes) {
                const box = new THREE.Box3();
                let initialized = false;
                meshes.forEach(m => {
                    const b = new THREE.Box3().setFromObject(m);
                    if (!initialized) {
                        box.copy(b);
                        initialized = true;
                    } else {
                        box.union(b);
                    }
                });
                return box;
            }

            // 相机飞行到包围盒
            flyToBox(box) {
                if (!box || !isFinite(box.max.x)) return;
                const center = new THREE.Vector3();
                const size = new THREE.Vector3();
                box.getCenter(center);
                box.getSize(size);
                const maxDim = Math.max(size.x, size.y, size.z);
                const fov = this.camera.fov * Math.PI / 180;
                const dist = (maxDim * 0.7) / Math.tan(fov / 2);
                const dir = new THREE.Vector3().subVectors(this.camera.position, this.controls.target).normalize();
                const toPos = center.clone().add(dir.multiplyScalar(dist));

                // 记录飞行动画参数
                this.flyFromPos.copy(this.camera.position);
                this.flyToPos.copy(toPos);
                this.flyFromTarget.copy(this.controls.target);
                this.flyToTarget.copy(center);
                this.flyStartTime = performance.now();
                this.isFlying = true;
            }

    // 加载环境贴图
    function loadEnvironmentMap(renderer) {
        // 使用程序化生成的环境贴图
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        // 创建一个渐变环境贴图
        const size = 256;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const context = canvas.getContext('2d');
        
        // 创建渐变
        const gradient = context.createLinearGradient(0, 0, 0, size);
        gradient.addColorStop(0, '#87CEEB'); // 天蓝色
        gradient.addColorStop(0.5, '#FFFFFF'); // 白色
        gradient.addColorStop(1, '#F0F8FF'); // 爱丽丝蓝
        
        context.fillStyle = gradient;
        context.fillRect(0, 0, size, size);
        
        // 转换为纹理
        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        
        // 生成环境贴图
        const envMap = pmremGenerator.fromEquirectangular(texture).texture;
        return envMap;
    }
    
    async function awaitMethod(timeout) {
        return new Promise((resolve, reject) => {
            setTimeout(() => {
                resolve();
            }, timeout);
        });
    }

    function checkYJCAndZCZ(model) {
        // 清空现有数组
        overflowSlotChildren.length = 0;
        supportPillarChildren.length = 0;
        
        if (!model || !gluePlaneWorldY) {
            console.warn('模型或点胶面高度未设置');
            return;
        }
        
        // 点胶面的法向量（垂直向上）
        const planeNormal = new THREE.Vector3(0, 1, 0);
        
        // 遍历模型中的所有 mesh
        model.traverse((child) => {
            if (!child.isMesh) return;
            
            // 更新世界矩阵以确保 boundingBox 计算正确
            child.updateWorldMatrix(true, false);
            
            // 计算 boundingBox
            const boundingBox = new THREE.Box3().setFromObject(child);
            const size = new THREE.Vector3();
            boundingBox.getSize(size);
            
            // 计算 mesh 的平均法向量
            let averageNormal = new THREE.Vector3(0, 0, 0);
            const geometry = child.geometry;
            
            // 确保几何体有法线属性
            if (!geometry.attributes.normal) {
                geometry.computeVertexNormals();
            }
            
            const normalAttribute = geometry.attributes.normal;
            if (normalAttribute && normalAttribute.count > 0) {
                // 使用法线矩阵来转换法向量（自动处理缩放）
                const normalMatrix = new THREE.Matrix3();
                normalMatrix.getNormalMatrix(child.matrixWorld);
                
                // 计算所有法向量的平均值（在世界坐标系中）
                let normalCount = 0;
                for (let i = 0; i < normalAttribute.count; i++) {
                    const normal = new THREE.Vector3().fromBufferAttribute(normalAttribute, i);
                    // 将法向量转换到世界坐标系（使用法线矩阵）
                    normal.applyMatrix3(normalMatrix).normalize();
                    averageNormal.add(normal);
                    normalCount++;
                }
                if (normalCount > 0) {
                    averageNormal.divideScalar(normalCount);
                    if (averageNormal.length() > 0.001) {
                        averageNormal.normalize();
                    } else {
                        // 如果法向量为零，跳过此 mesh
                        return;
                    }
                } else {
                    // 如果没有法向量数据，跳过此 mesh
                    return;
                }
            } else {
                // 如果没有法向量属性，跳过此 mesh
                return;
            }
            
            // 判断法向量是否与点胶面垂直（即法向量是否接近垂直方向）
            // 计算法向量与垂直方向的点积，接近1或-1表示垂直
            const dotProduct = Math.abs(averageNormal.dot(planeNormal));
            const isPerpendicularToPlane = dotProduct > 0.9; // 阈值可调整，0.7 约等于 45度
            
            if (isPerpendicularToPlane) {
                // 计算水平面（x-z 平面）上的长宽比
                const horizontalLength = Math.max(size.x, size.z);
                const center = new THREE.Vector3();
                boundingBox.getCenter(center);
                const distance = Math.abs(center.y - gluePlaneWorldY);
                // 长宽比不超过 10 倍

                if (distance < 0.25 && horizontalLength < 5) {
                    // 计算 mesh 的中心点（世界坐标）
                    
                    // 根据 y 坐标与点胶面高度的关系分类
                    if (center.y < gluePlaneWorldY) {
                        // 立胶槽：在点胶面之下
                        child.userData.direction = 1; // 向上延伸
                        child.material = color.green; // 标识为红色
                        overflowSlotChildren.push(child);
                    } else if (center.y > gluePlaneWorldY) {
                        // 支撑柱：在点胶面之上
                        child.userData.direction = -1; // 向下延伸
                        //child.material = new THREE.MeshBasicMaterial({ color: new THREE.Color(Math.random(), Math.random(), Math.random()), side: THREE.DoubleSide});
                        child.material = color.blue;
                        if (child.geometry && child.geometry.userData && child.geometry.userData.FaceID) {
                            child.userData.id = child.geometry.userData.FaceID;
                        }
                        supportPillarChildren.push(child);
                    }
                    // 如果 y 坐标等于点胶面高度，则不分类（可能是点胶面本身）
                }
            }
        });
        
        console.log(`筛选完成: 立胶槽 ${overflowSlotChildren.length} 个, 支撑柱 ${supportPillarChildren.length} 个`);
    }

    function filterDianjiaomianLine(scene, model, dianjiaomian) {
        const innerlines = [], outerlines = [];
        const lines = []; // 添加 lines 数组定义
        const OutterContour = dianjiaomian.geometry.userData.OutterContour.split(' ').map(v => Number(v));
        const InnerContour = dianjiaomian.geometry.userData.InnerContour.split(' ').map(v => Number(v));
        
        // 先更新整个模型的世界矩阵，确保所有子节点的矩阵都是最新的
        model.updateWorldMatrix(true, true);
        
        // 创建一个 Map 来快速查找 EdgeID 对应的 Line 对象
        const edgeIdToLine = new Map();
        model.traverse((child) => {
            if (child.isLine && child.geometry && child.geometry.userData && child.geometry.userData.EdgeID !== undefined) {
                edgeIdToLine.set(child.geometry.userData.EdgeID, child);
                if (OutterContour.indexOf(child.geometry.userData.EdgeID) > -1 || InnerContour.indexOf(child.geometry.userData.EdgeID) > -1) {
                    child.visible = true;
                    lines.push(child);
                    child.rotation.set(Math.PI * 3 / 2, 0, 0);
                } else {
                    child.visible = false;
                }
            }
        });
        
        // 按照 OutterContour 的顺序构造外圈线圈
        const orderedOuterLines = [];
        OutterContour.forEach((edgeID, idx) => {
            const line = edgeIdToLine.get(edgeID);
            if (line) {
                orderedOuterLines.push(line);
                line.material = new THREE.LineBasicMaterial({ 
                    color: new THREE.Color(1, 0, 0),  // 红色
                    linewidth: 4
                });
                outerlines.push(line);
                
                // 计算线段的中点并添加文字标签
                if (line.geometry && line.geometry.attributes.position) {
                    // 确保线段的世界矩阵是最新的（包括所有父节点的变换）
                    line.updateWorldMatrix(true, true);
                    const positions = line.geometry.attributes.position;
                    
                    if (positions.count >= 2) {
                        // 获取第一个和最后一个点（局部坐标）
                        const firstPointLocal = new THREE.Vector3().fromBufferAttribute(positions, 0);
                        const lastPointLocal = new THREE.Vector3().fromBufferAttribute(positions, positions.count - 1);
                        
                        // 转换到世界坐标
                        const firstPoint = firstPointLocal.clone().applyMatrix4(line.matrixWorld);
                        const lastPoint = lastPointLocal.clone().applyMatrix4(line.matrixWorld);
                        
                        // 计算中点（世界坐标）
                        const midPoint = new THREE.Vector3().addVectors(firstPoint, lastPoint).multiplyScalar(0.5);
                        
                        // 添加一个小的偏移，使标签稍微向上，避免与线段重叠
                        // 计算线段的方向向量，用于确定向上的方向
                        const lineDirection = new THREE.Vector3().subVectors(lastPoint, firstPoint).normalize();
                        const upVector = new THREE.Vector3(0, 1, 0);
                        const offsetDirection = new THREE.Vector3().crossVectors(lineDirection, upVector).normalize();
                        if (offsetDirection.length() > 0.1) {
                            midPoint.add(offsetDirection.multiplyScalar(0.1));
                        } else {
                            midPoint.y += 0.1;
                        }
                        
                        // 创建文字标签
                        // const label = createTextLabel(idx.toString(), midPoint);
                        // scene.add(label);
                    } else {
                        console.warn(`外圈线段 ${idx}: 顶点数不足 (${positions.count})`);
                    }
                } else {
                    console.warn(`外圈线段 ${idx}: 几何体或位置属性不存在`);
                }
            }
        });
        
        // 按照 InnerContour 的顺序构造内圈线圈
        const orderedInnerLines = [];
        InnerContour.forEach(edgeID => {
            const line = edgeIdToLine.get(edgeID);
            if (line) {
                orderedInnerLines.push(line);
                line.material = new THREE.LineBasicMaterial({ 
                    color: 0xffff00,  // 黄色
                    linewidth: 4
                });
                innerlines.push(line);
            }
        });
        
        orderedInnerLines.forEach(line => {
            scene.add(line);
        });
        orderedOuterLines.forEach(line => {
            scene.add(line);
        });
        
        // 添加一个测试标签在原点，验证 Sprite 是否能正常显示
        // const testLabel = createTextLabel('TEST', new THREE.Vector3(0, 0, 0));
        // scene.add(testLabel);
        console.log('已添加测试标签在原点');
        
        // 创建中线（传入有序的线段数组）
        const { middleLine} = createDianjiaomianMiddleLine(orderedInnerLines, orderedOuterLines, scene);
        return middleLine;
    }

    function createDianjiaomianMiddleLine(innerlines, outerlines, scene, showHelperGeometry) {
        // 默认不显示辅助几何体
        if (showHelperGeometry === undefined) {
            showHelperGeometry = false;
        }
        
        if (!innerlines || !outerlines || innerlines.length === 0 || outerlines.length === 0) {
            console.warn('内圈或外圈数据为空，无法创建中线');
            return null;
        }
        
        // 按照线段顺序构造完整的内圈和外圈线圈
        const innerPoints = [];
        const outerPoints = [];
        
        // 按照顺序提取内圈顶点，构造完整线圈
        innerlines.forEach((line, lineIndex) => {
            if (!line.geometry || !line.geometry.attributes.position) return;
            
            line.updateWorldMatrix(true, true);
            const positions = line.geometry.attributes.position;
            
            for (let i = 0; i < positions.count; i++) {
                const point = new THREE.Vector3().fromBufferAttribute(positions, i);
                // 转换到世界坐标
                point.applyMatrix4(line.matrixWorld);
                
                // 如果是第一条线段，添加所有点
                // 如果是后续线段，跳过第一个点（因为前一条线段的最后一个点就是当前线段的第一个点）
                if (lineIndex === 0 || i > 0) {
                    innerPoints.push(point);
                }
            }
        });
        
        // 按照顺序提取外圈顶点，构造完整线圈
        outerlines.forEach((line, lineIndex) => {
            if (!line.geometry || !line.geometry.attributes.position) return;
            
            line.updateWorldMatrix(true, true);
            const positions = line.geometry.attributes.position;
            
            for (let i = 0; i < positions.count; i++) {
                const point = new THREE.Vector3().fromBufferAttribute(positions, i);
                // 转换到世界坐标
                point.applyMatrix4(line.matrixWorld);
                
                // 如果是第一条线段，添加所有点
                // 如果是后续线段，跳过第一个点（因为前一条线段的最后一个点就是当前线段的第一个点）
                if (lineIndex === 0 || i > 0) {
                    outerPoints.push(point);
                }
            }
        });
        
        if (innerPoints.length === 0 || outerPoints.length === 0) {
            console.warn('内圈或外圈顶点数为0，无法创建中线');
            return null;
        }
        
        // 确保闭合：添加第一个点到末尾
        if (innerPoints.length > 0) {
            const firstInner = innerPoints[0];
            const lastInner = innerPoints[innerPoints.length - 1];
            if (firstInner.distanceTo(lastInner) > 0.001) {
                innerPoints.push(firstInner.clone());
            }
        }
        
        if (outerPoints.length > 0) {
            const firstOuter = outerPoints[0];
            const lastOuter = outerPoints[outerPoints.length - 1];
            if (firstOuter.distanceTo(lastOuter) > 0.001) {
                outerPoints.push(firstOuter.clone());
            }
        }

        // 沿着内圈采样点，计算中线
        const middlePoints = [];
        const sampleDistance = 0.5; // 采样间隔（可以根据需要调整）
        const perpendicularLength = 3; // 垂直线长度限制
        
        // 可视化：存储垂直线段和中点
        const perpendicularLines = []; // 垂直线段
        const middlePointMarkers = []; // 中点标记
        
        // 创建红色材质用于可视化
        const redLineMaterial = new THREE.LineBasicMaterial({ 
            color: 0xff0000,  // 红色
            linewidth: 2
        });
        
        const redPointMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xff0000,  // 红色
            transparent: true,
            opacity: 0.8
        });
        
        // 创建绿色材质用于标记内圈采样点
        const greenPointMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x00ff00,  // 绿色
            transparent: true,
            opacity: 0.6
        });
        
        // 创建蓝色材质用于标记交点
        const bluePointMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x0000ff,  // 蓝色
            transparent: true,
            opacity: 0.9
        });
        
        // 沿着内圈采样，每隔一定距离采样一个点
        let accumulatedDistance = 0;
        
        for (let i = 0; i < innerPoints.length - 1; i++) {
            const segmentStart = innerPoints[i];
            const segmentEnd = innerPoints[i + 1];
            const segmentLength = segmentStart.distanceTo(segmentEnd);
            
            // 在当前线段上采样
            let localDistance = 0;
            while (localDistance < segmentLength) {
                // 计算采样点位置
                const t = localDistance / segmentLength;
                const samplePoint = new THREE.Vector3().lerpVectors(segmentStart, segmentEnd, t);
                
                // 可视化：标记内圈采样点（绿色小球）
                if (showHelperGeometry) {
                    const innerPointGeometry = new THREE.SphereGeometry(0.08, 8, 8);
                    const innerPointMesh = new THREE.Mesh(innerPointGeometry, greenPointMaterial);
                    innerPointMesh.position.copy(samplePoint);
                    scene.add(innerPointMesh);
                }
                
                // 计算该点的切线方向（使用当前线段的方向，3D）
                const tangent3D = new THREE.Vector3().subVectors(segmentEnd, segmentStart);
                tangent3D.normalize();
                
                // 计算切线在水平面上的投影（用于计算垂直方向）
                const tangent2D = tangent3D.clone();
                tangent2D.y = 0;
                if (tangent2D.length() < 0.001) {
                    // 如果线段是垂直的，使用默认方向
                    tangent2D.set(1, 0, 0);
                }
                tangent2D.normalize();
                
                // 计算垂直于切线的方向（指向外圈，在水平面上）
                const perpDirection = getPerpendicularDirection(tangent2D, samplePoint, outerPoints);
                
                // 验证方向：确保垂直方向指向外圈（距离应该增加）
                const testPoint = new THREE.Vector3().addVectors(samplePoint, perpDirection.clone().multiplyScalar(0.1));
                let minDistToOuter = Infinity;
                outerPoints.forEach(p => {
                    const dist = testPoint.distanceTo(p);
                    if (dist < minDistToOuter) minDistToOuter = dist;
                });
                let minDistFromInner = Infinity;
                outerPoints.forEach(p => {
                    const dist = samplePoint.distanceTo(p);
                    if (dist < minDistFromInner) minDistFromInner = dist;
                });
                
                // 如果测试点距离外圈更远，说明方向可能反了，需要翻转
                if (minDistToOuter > minDistFromInner * 1.1) {
                    perpDirection.multiplyScalar(-1);
                    console.log(`在采样点 (${samplePoint.x.toFixed(3)}, ${samplePoint.z.toFixed(3)}) 处翻转了垂直方向`);
                }
                
                // 从内圈点出发，沿着垂直方向延伸，与外圈求交
                const perpendicularEnd = new THREE.Vector3().addVectors(
                    samplePoint,
                    perpDirection.clone().multiplyScalar(perpendicularLength)
                );
                
                // 与外圈所有线段求交，找到最近的交点（使用3D平面方法）
                let closestIntersection = null;
                let minDistance = Infinity;
                let intersectionFound = false;
                
                for (let j = 0; j < outerPoints.length - 1; j++) {
                    const outerStart = outerPoints[j];
                    const outerEnd = outerPoints[j + 1];
                    
                    // 使用3D平面方法计算交点
                    const intersection = lineSegmentIntersection3D(
                        samplePoint, perpendicularEnd,
                        outerStart, outerEnd,
                        tangent3D,
                        perpendicularLength
                    );
                    
                    if (intersection) {
                        const dist = samplePoint.distanceTo(intersection);
                        
                        if (dist < minDistance && dist <= perpendicularLength) {
                            minDistance = dist;
                            closestIntersection = intersection;
                            intersectionFound = true;
                        }
                    }
                }
                
                if (!intersectionFound) {
                    console.warn(`未找到交点: 采样点 (${samplePoint.x.toFixed(3)}, ${samplePoint.z.toFixed(3)}), 垂线终点 (${perpendicularEnd.x.toFixed(3)}, ${perpendicularEnd.z.toFixed(3)})`);
                }
                
                // 如果找到交点，计算中点并添加可视化
                if (closestIntersection) {
                    const middlePoint = new THREE.Vector3()
                        .addVectors(samplePoint, closestIntersection)
                        .multiplyScalar(0.5);
                    middlePoints.push(middlePoint);
                    
                    // 可视化：创建垂直线段（从内圈采样点到外圈交点）
                    if (showHelperGeometry) {
                        const perpendicularGeometry = new THREE.BufferGeometry();
                        const perpendicularVertices = new Float32Array([
                            samplePoint.x, samplePoint.y, samplePoint.z,
                            closestIntersection.x, closestIntersection.y, closestIntersection.z
                        ]);
                        perpendicularGeometry.setAttribute('position', new THREE.BufferAttribute(perpendicularVertices, 3));
                        const perpendicularLine = new THREE.Line(perpendicularGeometry, redLineMaterial);
                        perpendicularLines.push(perpendicularLine);
                        scene.add(perpendicularLine);
                        
                        // 可视化：创建交点标记（蓝色小球）
                        const intersectionGeometry = new THREE.SphereGeometry(0.12, 8, 8);
                        const intersectionMesh = new THREE.Mesh(intersectionGeometry, bluePointMaterial);
                        intersectionMesh.position.copy(closestIntersection);
                        scene.add(intersectionMesh);
                        
                        // 可视化：创建中点标记（红色小球）
                        const pointGeometry = new THREE.SphereGeometry(0.1, 8, 8);
                        const pointMesh = new THREE.Mesh(pointGeometry, redPointMaterial);
                        pointMesh.position.copy(middlePoint);
                        middlePointMarkers.push(pointMesh);
                        scene.add(pointMesh);
                    }
                    
                    // 调试信息
                    console.log(`采样点 (${samplePoint.x.toFixed(3)}, ${samplePoint.y.toFixed(3)}, ${samplePoint.z.toFixed(3)}) -> 交点 (${closestIntersection.x.toFixed(3)}, ${closestIntersection.y.toFixed(3)}, ${closestIntersection.z.toFixed(3)}) -> 中点 (${middlePoint.x.toFixed(3)}, ${middlePoint.y.toFixed(3)}, ${middlePoint.z.toFixed(3)})`);
                } else {
                    // 如果没有找到交点，也绘制垂直线段（到最大长度）
                    if (showHelperGeometry) {
                        const perpendicularGeometry = new THREE.BufferGeometry();
                        const perpendicularVertices = new Float32Array([
                            samplePoint.x, samplePoint.y, samplePoint.z,
                            perpendicularEnd.x, perpendicularEnd.y, perpendicularEnd.z
                        ]);
                        perpendicularGeometry.setAttribute('position', new THREE.BufferAttribute(perpendicularVertices, 3));
                        const perpendicularLine = new THREE.Line(perpendicularGeometry, new THREE.LineBasicMaterial({ 
                            color: 0xff00ff,  // 紫色，表示未找到交点
                            linewidth: 1
                        }));
                        perpendicularLines.push(perpendicularLine);
                        scene.add(perpendicularLine);
                    }
                    console.warn(`在采样点 (${samplePoint.x.toFixed(3)}, ${samplePoint.y.toFixed(3)}, ${samplePoint.z.toFixed(3)}) 处未找到外圈交点`);
                }
                
                // 移动到下一个采样点
                localDistance += sampleDistance;
            }
            
            accumulatedDistance += segmentLength;
        }
        
        // 确保闭合
        if (middlePoints.length > 0) {
            const first = middlePoints[0];
            const last = middlePoints[middlePoints.length - 1];
            if (first.distanceTo(last) > 0.001) {
                middlePoints.push(first.clone());
            }
        }
        
        console.log(`内圈点数: ${innerPoints.length}, 外圈点数: ${outerPoints.length}, 中点线圈点数: ${middlePoints.length}`);
        console.log(`可视化对象: 垂直线段 ${perpendicularLines.length} 条, 中点标记 ${middlePointMarkers.length} 个`);
        
        if (middlePoints.length === 0) {
            console.warn('未能生成任何中点，无法创建中线');
            return null;
        }
        
        // 创建中线几何体
        const geometry = new THREE.BufferGeometry();
        const vertices = new Float32Array(middlePoints.length * 3);
        
        for (let i = 0; i < middlePoints.length; i++) {
            vertices[i * 3] = middlePoints[i].x;
            vertices[i * 3 + 1] = middlePoints[i].y;
            vertices[i * 3 + 2] = middlePoints[i].z;
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        
        // 创建中线材质（使用青色以便区分）
        const material = new THREE.LineBasicMaterial({ 
            color: 0x00ffff,  
            linewidth: 3
        });
        
        // 创建中线对象
        const middleLine = new THREE.Line(geometry, material);
        
        // 添加到场景
        scene.add(middleLine);
        
        console.log(`中线创建完成: ${middlePoints.length} 个点`);
        if (showHelperGeometry) {
            console.log(`辅助几何体已显示: 绿色小球=内圈采样点，红色线段=垂直线段，蓝色小球=交点，红色小球=中点，紫色线段=未找到交点的垂直线`);
        } else {
            console.log(`辅助几何体已隐藏（可通过showHelperGeometry参数控制显示）`);
        }
        
        // 返回结果对象，包含中线和可视化对象
        return {
            middleLine: middleLine,
            perpendicularLines: perpendicularLines,
            middlePointMarkers: middlePointMarkers
        };
    }

                
    // 计算线段与线段相交的辅助函数（2D，在水平面上）- 保留作为备用
    function lineSegmentIntersection2D(p1, p2, p3, p4) {
    // 投影到水平面（x-z平面）
    const v1 = new THREE.Vector2(p2.x - p1.x, p2.z - p1.z);
    const v2 = new THREE.Vector2(p4.x - p3.x, p4.z - p3.z);
    const v3 = new THREE.Vector2(p1.x - p3.x, p1.z - p3.z);
    
    const cross = v1.x * v2.y - v1.y * v2.x; FMD,WF
    
    // 如果平行，返回null
    if (Math.abs(cross) < 1e-10) {
        return null;
    }
    
    const t1 = (v3.x * v2.y - v3.y * v2.x) / cross;
    const t2 = (v3.x * v1.y - v3.y * v1.x) / cross;
    
    // 检查交点是否在线段范围内（添加小的容差）
    const tolerance = 1e-6;
    if (t1 >= -tolerance && t1 <= 1 + tolerance && t2 >= -tolerance && t2 <= 1 + tolerance) {
        // 限制t1和t2在[0,1]范围内
        const clampedT1 = Math.max(0, Math.min(1, t1));
        const clampedT2 = Math.max(0, Math.min(1, t2));
        
        // 计算3D交点（在水平面上的交点，Y坐标使用外圈线段的插值）
        const intersection = new THREE.Vector3(
            p1.x + clampedT1 * (p2.x - p1.x),
            p3.y + clampedT2 * (p4.y - p3.y), // 使用外圈线段的Y坐标插值
            p1.z + clampedT1 * (p2.z - p1.z)
        );
        return intersection;
    }
    
    return null;
}

    // 计算线段与平面的交点（3D）
    function linePlaneIntersection(lineStart, lineEnd, planePoint, planeNormal) {
        const lineDir = new THREE.Vector3().subVectors(lineEnd, lineStart);
        const toPlane = new THREE.Vector3().subVectors(planePoint, lineStart);
        
        const denominator = lineDir.dot(planeNormal);
        
        // 如果线段与平面平行，返回null
        if (Math.abs(denominator) < 1e-10) {
            return null;
        }
        
        const t = toPlane.dot(planeNormal) / denominator;
        
        // 检查交点是否在线段范围内
        if (t >= 0 && t <= 1) {
            const intersection = new THREE.Vector3().addVectors(
                lineStart,
                lineDir.clone().multiplyScalar(t)
            );
            return intersection;
        }
        
        return null;
    }
    
    // 计算线段与线段的交点（在3D空间中，使用平面方法）
    function lineSegmentIntersection3D(perpendicularStart, perpendicularEnd, outerStart, outerEnd, tangent, maxLength) {
        // 创建平面：过垂线且垂直于内轮廓线的切线方向
        // 平面的法向量就是切线方向
        const planeNormal = tangent.clone().normalize();
        const planePoint = perpendicularStart;
        
        // 计算外圈线段与这个平面的交点
        const intersection = linePlaneIntersection(outerStart, outerEnd, planePoint, planeNormal);
        
        if (intersection) {
            // 检查交点是否在垂直线段的方向上（投影到垂直方向）
            const perpDir = new THREE.Vector3().subVectors(perpendicularEnd, perpendicularStart).normalize();
            const toIntersection = new THREE.Vector3().subVectors(intersection, perpendicularStart);
            const projection = toIntersection.dot(perpDir);
            
            // 计算交点距离垂线起点的距离
            const dist = perpendicularStart.distanceTo(intersection);
            
            // 如果投影在合理范围内，且距离不超过最大长度，返回交点
            if (projection >= -0.1 && projection <= maxLength + 0.1 && dist <= maxLength) {
                return intersection;
            }
        }
        
        return null;
    }
    
    // 计算内圈某点的切线方向（在水平面上）
    function getTangentAtPoint(points, index) {
        const prevIndex = index > 0 ? index - 1 : points.length - 2; // 跳过最后一个重复点
        const nextIndex = index < points.length - 1 ? index + 1 : 1;
        
        const prev = points[prevIndex];
        const next = points[nextIndex];
        const current = points[index];
        
        // 计算前后方向向量
        const forward = new THREE.Vector3().subVectors(next, current);
        const backward = new THREE.Vector3().subVectors(current, prev);
        
        // 平均方向作为切线
        const tangent = new THREE.Vector3().addVectors(forward, backward).multiplyScalar(0.5);
        
        // 投影到水平面（x-z平面）
        tangent.y = 0;
        tangent.normalize();
        
        return tangent;
    }
    
    // 计算垂直于切线的方向（在水平面上，指向外圈）
    function getPerpendicularDirection(tangent, innerPoint, outerPoints) {
        // 计算垂直于切线的两个可能方向（在水平面上）
        const perp1 = new THREE.Vector3(-tangent.z, 0, tangent.x);
        const perp2 = new THREE.Vector3(tangent.z, 0, -tangent.x);
        
        // 找到外圈上距离内圈点最近的点
        let closestOuterPoint = null;
        let minDist = Infinity;
        
        for (let i = 0; i < outerPoints.length; i++) {
            const outerPoint = outerPoints[i];
            const dist = innerPoint.distanceTo(outerPoint);
            if (dist < minDist) {
                minDist = dist;
                closestOuterPoint = outerPoint;
            }
        }
        
        if (!closestOuterPoint) {
            // 如果找不到最近点，使用默认方向
            return perp1;
        }
        
        // 计算从内圈点到最近外圈点的方向（投影到水平面）
        const toOuter = new THREE.Vector3().subVectors(closestOuterPoint, innerPoint);
        toOuter.y = 0;
        toOuter.normalize();
        
        // 选择与指向外圈方向更接近的垂直方向
        const dot1 = perp1.dot(toOuter);
        const dot2 = perp2.dot(toOuter);
        
        // 返回与指向外圈方向更一致的那个
        return dot1 > dot2 ? perp1 : perp2;
    }
         
    // 创建文字标签的辅助函数
    function createTextLabel(text, position) {
            // 创建 Canvas 2D 文字纹理
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 128;
            
            // 清除画布
            context.clearRect(0, 0, canvas.width, canvas.height);
            
            // 设置背景
            context.fillStyle = 'rgba(255, 255, 255, 0.0)';
            context.fillRect(0, 0, canvas.width, canvas.height);
            // 设置文字样式
            context.fillStyle = 'black';
            context.font = 'Bold 64px Arial';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            
            // 绘制文字
            context.fillText(text, canvas.width / 2, canvas.height / 2);
            
            // 创建纹理
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            texture.flipY = true; // 翻转纹理Y轴，修正文字方向
            
            // 创建 Sprite 材质
            const spriteMaterial = new THREE.SpriteMaterial({ 
                map: texture,
                transparent: true,
                alphaTest: 0.01,
                depthTest: true,
                depthWrite: false
            });
            
            // 创建 Sprite
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.position.copy(position);
            // 增大标签尺寸，使其更容易看到（根据场景大小调整）
            // 如果场景很大，可能需要更大的 scale
            sprite.scale.set(0.5, 0.25, 0.1); // 调整标签大小，增大以便更容易看到
            
            // Sprite 默认总是面向相机，不需要额外设置
            
            console.log(`创建标签 "${text}" 在位置:`, position, 'scale:', sprite.scale);
            
            return sprite;
        }
    </script>
