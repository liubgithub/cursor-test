<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Three.js Draw Tool - Sphere and Grid</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="./lib/maptalks.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "./lib/three.module.js"
            }
        }
    </script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from './lib/OrbitControls.js';
    import DrawTool from './module/DrawTool.js';
    // 创建场景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeeeeee);

    // 创建相机
    const camera = new THREE.PerspectiveCamera(
        75, 
        window.innerWidth / window.innerHeight, 
        0.1, 
        1000
    );
    camera.position.set(0, 5, 10);

    // 创建渲染器
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 添加轨道控制器
    const controls = new OrbitControls(camera, renderer.domElement);

    // 添加网格辅助线
    const gridHelper = new THREE.GridHelper(20, 20);
    scene.add(gridHelper);
    // 创建球体



    // 创建球体
    // const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
    // const sphereMaterial = new THREE.MeshStandardMaterial({ color: 0x0077ff });
    // const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    // sphere.position.set(0, 1, 0); // 让球体在网格上方
    // scene.add(sphere);
    const geometry = new THREE.BoxGeometry(100, 0.1, 100); 
    const material = new THREE.MeshBasicMaterial( {color: 0xffffff, opacity: 0.1, transparent: true} ); 
    const cube = new THREE.Mesh( geometry, material );
    scene.add(cube);

    // 添加光源
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7.5);
    scene.add(directionalLight);

    const drawTool = new DrawTool(renderer, camera);
    drawTool.setTarget([cube]);
    drawTool.addTo(scene);
    drawTool.on('drawend', (e) => {
        setTimeout(() => {
            const mapDiv = document.createElement('div');
            mapDiv.style.width = '1px';
            mapDiv.style.height = '1px';
            // document.body.appendChild(mapDiv);
            const map = new maptalks.Map(mapDiv, {
                center: [0, 0],
                zoom: 2
            });
            const positions = e.line.geometry.getAttribute('position').array;
            const coordinates = [];
            for (let i = 0; i < positions.length / 3; i++) {
                coordinates.push([positions[i * 3], positions[i * 3 + 2], positions[i * 3 + 1]]);
            }
            const line = new maptalks.LineString(coordinates)
            const vlayer = new maptalks.VectorLayer('vlayer');
            vlayer.addGeometry(line);
            map.addLayer(vlayer);
            line.animateShow({
            duration : 10000,
            easing : 'linear'
            }, function (frame, currentCoord) {
                const coords = line.getCoordinates();
                const array = new Float32Array(coords.length * 3);
                for (let i = 0; i < coords.length; i++) {
                    array[i * 3] = coords[i].x;   
                    array[i * 3 + 2] = coords[i].y;
                    array[i * 3 + 1] = coords[i].z || 0;
                }
                const posAttr = new THREE.BufferAttribute( array, 3 );
                posAttr.usage = THREE.DynamicDrawUsage;
                e.line.geometry.setAttribute( 'position',  posAttr);
            });
        }, 1000);
    })
    // 处理窗口大小变化
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 动画循环
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
