<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 胶状体生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            text-align: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
        }
        h1 {
            margin: 0;
            font-size: 2.2rem;
            background: linear-gradient(45deg, #4cc9f0, #4361ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1rem;
            color: #a0a0c0;
            margin-top: 0.5rem;
        }
        .content {
            display: flex;
            flex: 1;
        }
        #canvas-container {
            flex: 3;
            position: relative;
            width: 80%;
        }
        .controls {
            flex: 1;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }
        .control-group {
            margin-bottom: 1.5rem;
        }
        .control-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #4cc9f0;
            border-bottom: 1px solid #4cc9f050;
            padding-bottom: 0.5rem;
        }
        .slider-container {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e0e0ff;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(200, 200, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4361ee;
            cursor: pointer;
            transition: background 0.3s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            background: #4cc9f0;
        }
        .value-display {
            text-align: right;
            color: #a0a0c0;
            font-size: 0.9rem;
        }
        .instructions {
            background: rgba(76, 201, 240, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 2rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }
            #canvas-container {
                height: 60vh;
            }
            .controls {
                max-height: 40vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Three.js 胶状体生成器</h1>
            <div class="subtitle">通过调整参数创建自定义胶状体三维模型</div>
        </div>
        <div class="content">
            <div id="canvas-container"></div>
            <div class="controls">
                <div class="control-group">
                    <div class="control-title">形状参数</div>
                    <div class="slider-container">
                        <label for="length">长度</label>
                        <input type="range" id="length" min="1" max="10" step="0.1" value="4">
                        <div class="value-display"><span id="length-value">4.0</span> 单位</div>
                    </div>
                    <div class="slider-container">
                        <label for="width">宽度</label>
                        <input type="range" id="width" min="1" max="10" step="0.1" value="3">
                        <div class="value-display"><span id="width-value">3.0</span> 单位</div>
                    </div>
                    <div class="slider-container">
                        <label for="height">高度</label>
                        <input type="range" id="height" min="1" max="10" step="0.1" value="5">
                        <div class="value-display"><span id="height-value">5.0</span> 单位</div>
                    </div>
                    <div class="slider-container">
                        <label for="roundness">表面圆弧度</label>
                        <input type="range" id="roundness" min="0.1" max="2" step="0.1" value="0.8">
                        <div class="value-display"><span id="roundness-value">0.8</span></div>
                    </div>
                </div>
                
                <div class="control-group">
                    <div class="control-title">外观设置</div>
                    <div class="slider-container">
                        <label for="color">颜色</label>
                        <input type="color" id="color" value="#4361ee" style="width: 100%; height: 40px;">
                    </div>
                    <div class="slider-container">
                        <label for="opacity">透明度</label>
                        <input type="range" id="opacity" min="0.3" max="1" step="0.05" value="0.8">
                        <div class="value-display"><span id="opacity-value">0.8</span></div>
                    </div>
                </div>
                
                <div class="instructions">
                    <p><strong>使用说明：</strong></p>
                    <p>• 拖动滑块调整胶状体参数</p>
                    <p>• 鼠标拖动可旋转视图</p>
                    <p>• 滚轮可缩放视图</p>
                    <p>• 右键拖动可平移视图</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let scene, camera, renderer, controls;
        let blobMesh;
        let clock = new THREE.Clock();

        // 初始化场景
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // 添加轨道控制
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            // 添加灯光
            const ambientLight = new THREE.AmbientLight(0x444466);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);
            
            const backLight = new THREE.DirectionalLight(0x332255, 0.8);
            backLight.position.set(-5, -5, -5);
            scene.add(backLight);
            
            // 创建胶状体
            createBlob(4, 3, 5, 0.8, '#4361ee', 0.8);
            
            // 添加窗口调整事件监听
            window.addEventListener('resize', onWindowResize);
            
            // 添加参数控制事件监听
            setupControls();
            
            // 开始动画循环
            animate();
        }
        
        // 创建胶状体函数
        function createBlob(length, width, height, roundness, color, opacity) {
            // 如果已存在胶状体，则从场景中移除
            if (blobMesh) {
                scene.remove(blobMesh);
                blobMesh.geometry.dispose();
                blobMesh.material.dispose();
            }
            
            // 创建自定义几何体
            const geometry = new THREE.SphereGeometry(1, 64, 64);
            
            // 获取顶点位置
            const position = geometry.attributes.position;
            const vertex = new THREE.Vector3();
            
            // 对每个顶点进行变形
            for (let i = 0; i < position.count; i++) {
                // 获取原始顶点坐标（球体上的点）
                vertex.fromBufferAttribute(position, i);
                
                // 将球体变形为椭球体
                vertex.x *= length/2;
                vertex.y *= height/2;
                vertex.z *= width/2;
                
                // 应用噪声使表面不规则
                const noise = Math.sin(vertex.x * 2) * Math.sin(vertex.y * 3) * Math.sin(vertex.z * 2) * 0.1 * roundness;
                vertex.x += noise;
                vertex.y += noise;
                vertex.z += noise;
                
                // 将修改后的坐标写回几何体
                position.setXYZ(i, vertex.x, vertex.y, vertex.z);
            }
            
            // 更新法线
            geometry.computeVertexNormals();
            
            // 创建材质
            const material = new THREE.MeshPhongMaterial({
                color: new THREE.Color(color),
                shininess: 80,
                transparent: true,
                opacity: opacity,
                side: THREE.DoubleSide
            });
            
            // 创建网格
            blobMesh = new THREE.Mesh(geometry, material);
            scene.add(blobMesh);
        }
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 更新控件
            controls.update();
            
            // 添加一些微妙的动画
            const time = clock.getElapsedTime();
            if (blobMesh) {
                blobMesh.rotation.y = time * 0.2;
                blobMesh.position.y = Math.sin(time * 0.5) * 0.2;
            }
            
            // 渲染场景
            renderer.render(scene, camera);
        }
        
        // 窗口调整大小时的处理
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 设置控制事件
        function setupControls() {
            // 获取DOM元素
            const lengthSlider = document.getElementById('length');
            const widthSlider = document.getElementById('width');
            const heightSlider = document.getElementById('height');
            const roundnessSlider = document.getElementById('roundness');
            const colorPicker = document.getElementById('color');
            const opacitySlider = document.getElementById('opacity');
            
            // 更新显示的值
            lengthSlider.addEventListener('input', function() {
                document.getElementById('length-value').textContent = this.value;
                updateBlob();
            });
            
            widthSlider.addEventListener('input', function() {
                document.getElementById('width-value').textContent = this.value;
                updateBlob();
            });
            
            heightSlider.addEventListener('input', function() {
                document.getElementById('height-value').textContent = this.value;
                updateBlob();
            });
            
            roundnessSlider.addEventListener('input', function() {
                document.getElementById('roundness-value').textContent = this.value;
                updateBlob();
            });
            
            colorPicker.addEventListener('input', function() {
                updateBlob();
            });
            
            opacitySlider.addEventListener('input', function() {
                document.getElementById('opacity-value').textContent = this.value;
                updateBlob();
            });
        }
        
        // 更新胶状体
        function updateBlob() {
            const length = parseFloat(document.getElementById('length').value);
            const width = parseFloat(document.getElementById('width').value);
            const height = parseFloat(document.getElementById('height').value);
            const roundness = parseFloat(document.getElementById('roundness').value);
            const color = document.getElementById('color').value;
            const opacity = parseFloat(document.getElementById('opacity').value);
            
            createBlob(length, width, height, roundness, color, opacity);
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
