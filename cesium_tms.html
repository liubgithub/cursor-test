<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesium 加载 TMS 地图服务</title>
    <!-- 若本地已部署 Cesium，请按需调整以下脚本路径 -->
    <script src="http://localhost:8080/Build/CesiumUnminified/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        html, body, #cesiumContainer {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
            font-family: Arial, sans-serif;
        }
        .panel {
            position: absolute; left: 10px; top: 10px; z-index: 1000;
            background: rgba(42,42,42,.85); color: #fff; padding: 12px 14px;
            border-radius: 8px; min-width: 320px; backdrop-filter: blur(8px);
        }
        .panel h3 { margin: 0 0 10px; font-size: 16px; color: #74c0ff; }
        .row { margin-bottom: 10px; }
        .row label { display: block; margin-bottom: 6px; font-weight: bold; }
        .row input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #555; border-radius: 4px; background: rgba(255,255,255,.08); color: #fff; }
        .btn { background: #0d6efd; border: none; color: #fff; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .btn.secondary { background: #6c757d; }
        .hint { font-size: 12px; color: #cbd5e1; margin-top: 6px; line-height: 1.4; }
    </style>
    <script>
        // 简单的等待工具
        function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }
    </script>
</head>
<body>
    <div id="cesiumContainer"></div>

    <script>
        // 可选：如使用 Cesium Ion 资源，可在此设置令牌
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIzMDhiNDA0Yy0zZjM2LTQyN2EtODdhMS1jNGI0YzhkOGNiOTIiLCJpZCI6OTYyOCwiaWF0IjoxNzQyOTgwNzQ4fQ.UzWRyt0nN4tiqqHca6VFXnm0MOsT5x5o1gSR65S6kjw';

        // 创建 Viewer（关闭不必要的 UI）
        const viewer = new Cesium.Viewer('cesiumContainer', {
            timeline: false,
            animation: false,
            baseLayerPicker: false,
            fullscreenButton: false,
            vrButton: false,
            geocoder: false,
            homeButton: false,
            infoBox: false,
            sceneModePicker: false,
            selectionIndicator: false,
            navigationHelpButton: false,
            navigationInstructionsInitiallyVisible: false
        });

        // 移除默认底图并添加全球 OSM 底图
        // if (viewer.imageryLayers.length > 0) {
        //     viewer.imageryLayers.removeAll();
        // }
        // const worldBaseLayer = viewer.imageryLayers.addImageryProvider(
        //     new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org/' })
        // );

        // 目标相机位置（经度, 纬度, 高度米）
        const targetDestination = Cesium.Cartesian3.fromDegrees(114.41,30.54, 5000);
        // 初始化聚焦到目标位置
        viewer.camera.setView({ destination: targetDestination });

        let tmsLayer = null;
        let vectorLayer = null;

        async function addOrReplaceTmsLayer() {
            // const key = document.getElementById('processKey').value.trim();
            // const token = document.getElementById('authToken').value.trim();
            const key = '9da3743b-eaf9-47a7-81f8-b59428fc38a0_whu01_buildtop_1761882716328_6365';
            const token = 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1aWQiOjQzNiwidXNlcl9uYW1lIjoic3dzazMzIiwic2NvcGUiOlsid2ViIl0sImV4cCI6MTc2MTkzODI3NiwidXVpZCI6IjlkYTM3NDNiLWVhZjktNDdhNy04MWY4LWI1OTQyOGZjMzhhMCIsImF1dGhvcml0aWVzIjpbIjEiXSwianRpIjoiQWVOVkxaVkxIWWZqYzZwaEVxa28td0VDcVVvIiwiY2xpZW50X2lkIjoidGVzdCIsInVzZXJuYW1lIjoic3dzazMzIn0.0rL6Dlzn3Fn1-zkl7HtxzdPhC2CFOdDSe8PVIvWzQjo';
            if (!key) { alert('请输入 key (processId)'); return; }
            if (!token) { alert('请输入 Authorization Bearer Token'); return; }

            // 目标接口（XYZ 瓦片参数）。示例：
            // https://opengge.org.cn/api/model/geoImage/get_image?type=2&key={key}&x={x}&y={y}&z={z}&model=1
            const template = `https://www.hyznb.cn/ogeapi/api/model/geoImage/get_image?type=2&key=${encodeURIComponent(key)}&x={x}&y={y}&z={z}&model=1`;

            const resource = new Cesium.Resource({
                url: template,
                headers: {
                    // 需包含前缀 Bearer
                    'Authorization': token
                }
            });

            const provider = new Cesium.UrlTemplateImageryProvider({
                url: resource,
                tilingScheme: new Cesium.WebMercatorTilingScheme(),
                minimumLevel: 0,
                maximumLevel: 20,
                rectangle: Cesium.Rectangle.MAX_VALUE
            });

            if (tmsLayer) {
                viewer.imageryLayers.remove(tmsLayer, true);
                tmsLayer = null;
                // 小等待，确保 provider 释放，避免同 URL 读取缓存问题
                await sleep(50);
            }

            tmsLayer = viewer.imageryLayers.addImageryProvider(provider);

            // 保持视角：飞到目标区域
            viewer.camera.flyTo({ destination: targetDestination, duration: 0.8 });

            // 自动叠加矢量瓦片
            await addOrReplaceVectorLayer(key, token);
        }

        async function addOrReplaceVectorLayer(key, token){
            try{
                // https://openge.org.cn/api/data-product/vector-tms/tile/{type}/{processId}/{z}/{x}/{y}
                // const vectorTemplate = `https://www.hyznb.cn/ogeapi/api/model/geoImage/get_vector?type=2&key=${encodeURIComponent(key)}&x={x}&y={y}&z={z}&model=1`;
                const vectorTemplate = `https://www.hyznb.cn/ogeapi/api/data-product/vector-tms/tile/2/${key}/{z}/{x}/{y}`;
                const vectorResource = new Cesium.Resource({
                    url: vectorTemplate,
                    headers: { 'Authorization': token }
                });
                const vectorProvider = new Cesium.UrlTemplateImageryProvider({
                    url: vectorResource,
                    tilingScheme: new Cesium.WebMercatorTilingScheme(),
                    minimumLevel: 0,
                    maximumLevel: 20,
                    rectangle: Cesium.Rectangle.MAX_VALUE
                });

                if (vectorLayer) {
                    viewer.imageryLayers.remove(vectorLayer, true);
                    vectorLayer = null;
                    await sleep(30);
                }
                vectorLayer = viewer.imageryLayers.addImageryProvider(vectorProvider);
                vectorLayer.alpha = 1.0; // 需要透明底可调低
            } catch(e){
                console.error('矢量瓦片加载失败: ', e);
            }
        }

        function removeTmsLayer() {
            if (tmsLayer) {
                viewer.imageryLayers.remove(tmsLayer, true);
                tmsLayer = null;
            }
        }
        addOrReplaceTmsLayer();
    </script>
</body>
</html>
