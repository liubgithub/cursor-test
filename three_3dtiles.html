<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DTilesRendererJS - 3D Tiles加载示例</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        .info-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(42, 42, 42, 0.8);
            padding: 15px;
            border-radius: 8px;
            color: white;
            z-index: 1000;
            min-width: 300px;
            backdrop-filter: blur(10px);
        }
        .info-panel h3 {
            margin-top: 0;
            color: #007acc;
        }
        .status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status.loading {
            background: rgba(23, 162, 184, 0.2);
            border: 1px solid #17a2b8;
            color: #17a2b8;
        }
        .status.success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #28a745;
        }
        .status.error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #dc3545;
        }
        .control-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(42, 42, 42, 0.8);
            padding: 15px;
            border-radius: 8px;
            color: white;
            z-index: 1000;
            min-width: 250px;
            backdrop-filter: blur(10px);
        }
        .control-panel h3 {
            margin-top: 0;
            color: #007acc;
        }
        .control-group {
            margin-top: 10px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .control-group input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }
        .control-group input[type="number"] {
            width: 60px;
            padding: 4px;
            margin-left: 5px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            color: white;
        }
        .control-group button {
            padding: 6px 12px;
            margin-top: 5px;
            background: #007acc;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        .control-group button:hover {
            background: #005a9e;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h3>3DTilesRendererJS 加载器</h3>
        <div>
            <strong>3D Tiles URL:</strong><br>
            <span style="font-size: 12px; word-break: break-all;">
                http://resource.dvgis.cn/data/3dtiles/dayanta/tileset.json
            </span>
        </div>
        <div id="status" class="status loading">
            正在加载3D Tiles...
        </div>
        <div style="margin-top: 10px; font-size: 12px;">
            <strong>操作说明:</strong><br>
            • 鼠标左键拖拽：旋转视角<br>
            • 鼠标右键拖拽：平移<br>
            • 鼠标滚轮：缩放<br>
            • 中键拖拽：平移
        </div>
    </div>

    <div class="control-panel">
        <h3>裁剪平面控制</h3>
        <div class="control-group">
            <label>
                <input type="checkbox" id="enableClipping" checked>
                启用裁剪
            </label>
        </div>
        <div class="control-group">
            <label>
                平面位置 (Y):
                <input type="range" id="planePosition" min="-100" max="100" value="0" step="0.1">
                <input type="number" id="planePositionValue" value="0" step="0.1">
            </label>
        </div>
        <div class="control-group">
            <label>
                平面方向 (X):
                <input type="range" id="planeNormalX" min="-1" max="1" value="0" step="0.01">
                <input type="number" id="planeNormalXValue" value="0" step="0.01">
            </label>
        </div>
        <div class="control-group">
            <label>
                平面方向 (Y):
                <input type="range" id="planeNormalY" min="-1" max="1" value="1" step="0.01">
                <input type="number" id="planeNormalYValue" value="1" step="0.01">
            </label>
        </div>
        <div class="control-group">
            <label>
                平面方向 (Z):
                <input type="range" id="planeNormalZ" min="-1" max="1" value="0" step="0.01">
                <input type="number" id="planeNormalZValue" value="0" step="0.01">
            </label>
        </div>
        <div class="control-group">
            <button id="resetPlane">重置平面</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "./lib/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "3d-tiles-renderer": "https://esm.sh/3d-tiles-renderer@0.3.40"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from './lib/OrbitControls.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { TilesRenderer } from '3d-tiles-renderer';

        function init() {
            // 创建场景
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // 天蓝色背景

            // 创建相机
            const camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                10000
            );
            camera.position.set(0, 0, 100);

            // 创建渲染器
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // 启用本地裁剪
            renderer.localClippingEnabled = true;
            document.body.appendChild(renderer.domElement);

            // 添加轨道控制器
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 1;
            controls.maxDistance = 10000;

            // 添加光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);

            // 添加辅助网格
            // const gridHelper = new THREE.GridHelper(100, 100);
            // scene.add(gridHelper);

            // // 添加坐标轴辅助
            // const axesHelper = new THREE.AxesHelper(50);
            // scene.add(axesHelper);

            // 配置 DRACOLoader
            const dracoLoader = new DRACOLoader();
            // 使用 Google 的 CDN 提供 Draco 解码器
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');

            // 3D Tiles URL
            const tilesetUrl = 'http://resource.dvgis.cn/data/3dtiles/dayanta/tileset.json';

            // 创建3DTilesRenderer实例
            const tilesRenderer = new TilesRenderer(tilesetUrl);
            
            // 在创建后立即配置 DRACOLoader
            // 方法：拦截 GLTFLoader 的创建，或者直接修改现有的 loader
            const configureDRACOLoader = () => {
                const manager = tilesRenderer.manager;
                if (!manager) return;
                
                // 尝试多种方式访问和配置 loader
                const methods = [
                    // 方法1: 通过 _handlers 对象
                    () => {
                        if (manager._handlers) {
                            for (const key in manager._handlers) {
                                const handler = manager._handlers[key];
                                if (handler && typeof handler.setDRACOLoader === 'function') {
                                    if (!handler.dracoLoader) {
                                        handler.setDRACOLoader(dracoLoader);
                                        console.log('✓ Configured DRACOLoader via _handlers:', key);
                                        return true;
                                    }
                                }
                            }
                        }
                        return false;
                    },
                    // 方法2: 通过 getHandler 方法
                    () => {
                        if (typeof manager.getHandler === 'function') {
                            const extensions = ['.gltf', '.glb'];
                            for (const ext of extensions) {
                                const loader = manager.getHandler(ext);
                                if (loader && typeof loader.setDRACOLoader === 'function') {
                                    if (!loader.dracoLoader) {
                                        loader.setDRACOLoader(dracoLoader);
                                        console.log('✓ Configured DRACOLoader via getHandler:', ext);
                                        return true;
                                    }
                                }
                            }
                        }
                        return false;
                    },
                    // 方法3: 直接创建新的 GLTFLoader 并替换
                    () => {
                        const newGltfLoader = new GLTFLoader(manager);
                        newGltfLoader.setDRACOLoader(dracoLoader);
                        if (manager.addHandler) {
                            manager.addHandler(/\.gltf$/i, newGltfLoader);
                            manager.addHandler(/\.glb$/i, newGltfLoader);
                            console.log('✓ Added new GLTFLoader with DRACOLoader');
                            return true;
                        }
                        return false;
                    },
                    // 方法4: 修改 manager 的 addHandler 方法，拦截新的 handler 注册
                    () => {
                        if (manager.addHandler) {
                            const originalAddHandler = manager.addHandler.bind(manager);
                            manager.addHandler = function(regex, loader) {
                                const result = originalAddHandler(regex, loader);
                                if (loader && typeof loader.setDRACOLoader === 'function' && !loader.dracoLoader) {
                                    loader.setDRACOLoader(dracoLoader);
                                    console.log('✓ Configured DRACOLoader via addHandler hook');
                                }
                                return result;
                            };
                            return true;
                        }
                        return false;
                    }
                ];
                
                // 尝试所有方法
                for (const method of methods) {
                    try {
                        if (method()) break;
                    } catch (e) {
                        console.warn('Method failed:', e);
                    }
                }
            };

            // 立即配置
            configureDRACOLoader();
            
            // 监听加载事件，在每次加载时重新配置（防止新的 loader 被创建）
            if (tilesRenderer.manager) {
                const manager = tilesRenderer.manager;
                
                // 拦截 itemStart 方法
                if (manager.itemStart) {
                    const originalItemStart = manager.itemStart.bind(manager);
                    manager.itemStart = function(url) {
                        configureDRACOLoader();
                        return originalItemStart(url);
                    };
                }
                
                // 使用 setInterval 定期检查（作为备用方案）
                const checkInterval = setInterval(() => {
                    configureDRACOLoader();
                }, 1000);
                
                // 在页面卸载时清除定时器
                window.addEventListener('beforeunload', () => {
                    clearInterval(checkInterval);
                });
            }
            
            tilesRenderer.setCamera(camera);
            tilesRenderer.setResolutionFromRenderer(camera, renderer);
            
            // 设置缓存大小（可选，根据模型大小调整）
            tilesRenderer.lruCache.maxBytesSize = 2000 * 1e6; // 2GB

            // 将tileset添加到场景
            scene.add(tilesRenderer.group);

            // 创建裁剪平面
            const clippingPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            renderer.clippingPlanes = [clippingPlane];

            // 创建平面辅助器用于可视化
            let planeHelper = new THREE.PlaneHelper(clippingPlane, 50, 0xff0000);
            scene.add(planeHelper);

            // 裁剪平面控制
            let planePosition = 0;
            let planeNormal = new THREE.Vector3(0, 1, 0);

            function updateClippingPlane() {
                clippingPlane.normal.copy(planeNormal).normalize();
                clippingPlane.constant = -planePosition;
                planeHelper.updateMatrixWorld();
                
                // 更新所有已加载材质的裁剪平面
                tilesRenderer.group.traverse((object) => {
                    if (object.isMesh && object.material) {
                        if (Array.isArray(object.material)) {
                            object.material.forEach(mat => {
                                mat.clippingPlanes = renderer.clippingPlanes;
                            });
                        } else {
                            object.material.clippingPlanes = renderer.clippingPlanes;
                        }
                    }
                });
            }

            // 绑定控制面板事件
            const enableClippingCheckbox = document.getElementById('enableClipping');
            const planePositionSlider = document.getElementById('planePosition');
            const planePositionValue = document.getElementById('planePositionValue');
            const planeNormalXSlider = document.getElementById('planeNormalX');
            const planeNormalXValue = document.getElementById('planeNormalXValue');
            const planeNormalYSlider = document.getElementById('planeNormalY');
            const planeNormalYValue = document.getElementById('planeNormalYValue');
            const planeNormalZSlider = document.getElementById('planeNormalZ');
            const planeNormalZValue = document.getElementById('planeNormalZValue');
            const resetPlaneBtn = document.getElementById('resetPlane');

            // 启用/禁用裁剪
            enableClippingCheckbox.addEventListener('change', (e) => {
                renderer.localClippingEnabled = e.target.checked;
                planeHelper.visible = e.target.checked;
            });

            // 平面位置控制
            planePositionSlider.addEventListener('input', (e) => {
                planePosition = parseFloat(e.target.value);
                planePositionValue.value = planePosition;
                updateClippingPlane();
            });
            planePositionValue.addEventListener('input', (e) => {
                planePosition = parseFloat(e.target.value);
                planePositionSlider.value = planePosition;
                updateClippingPlane();
            });

            // 平面法向量X控制
            planeNormalXSlider.addEventListener('input', (e) => {
                planeNormal.x = parseFloat(e.target.value);
                planeNormalXValue.value = planeNormal.x;
                updateClippingPlane();
            });
            planeNormalXValue.addEventListener('input', (e) => {
                planeNormal.x = parseFloat(e.target.value);
                planeNormalXSlider.value = planeNormal.x;
                updateClippingPlane();
            });

            // 平面法向量Y控制
            planeNormalYSlider.addEventListener('input', (e) => {
                planeNormal.y = parseFloat(e.target.value);
                planeNormalYValue.value = planeNormal.y;
                updateClippingPlane();
            });
            planeNormalYValue.addEventListener('input', (e) => {
                planeNormal.y = parseFloat(e.target.value);
                planeNormalYSlider.value = planeNormal.y;
                updateClippingPlane();
            });

            // 平面法向量Z控制
            planeNormalZSlider.addEventListener('input', (e) => {
                planeNormal.z = parseFloat(e.target.value);
                planeNormalZValue.value = planeNormal.z;
                updateClippingPlane();
            });
            planeNormalZValue.addEventListener('input', (e) => {
                planeNormal.z = parseFloat(e.target.value);
                planeNormalZSlider.value = planeNormal.z;
                updateClippingPlane();
            });

            // 重置平面
            resetPlaneBtn.addEventListener('click', () => {
                planePosition = 0;
                planeNormal.set(0, 1, 0);
                planePositionSlider.value = 0;
                planePositionValue.value = 0;
                planeNormalXSlider.value = 0;
                planeNormalXValue.value = 0;
                planeNormalYSlider.value = 1;
                planeNormalYValue.value = 1;
                planeNormalZSlider.value = 0;
                planeNormalZValue.value = 0;
                updateClippingPlane();
            });

            // 初始化平面
            updateClippingPlane();

            // 更新状态
            function updateStatus(message, type) {
                const statusDiv = document.getElementById('status');
                statusDiv.textContent = message;
                statusDiv.className = `status ${type}`;
            }

            // 监听tileset加载事件
            tilesRenderer.addEventListener('load-tile-set', () => {
                updateStatus('3D Tiles加载成功！', 'success');
                console.log('Tileset loaded successfully');
                
                // 调整模型位置到世界坐标系原点
                const sphere = new THREE.Sphere();
                tilesRenderer.getBoundingSphere(sphere);
                tilesRenderer.group.position.copy(sphere.center).multiplyScalar(-1);
                
                // 调整裁剪平面位置范围以适应模型
                const radius = sphere.radius;
                planePositionSlider.min = -radius * 2;
                planePositionSlider.max = radius * 2;
                planePositionSlider.value = 0;
                planePositionValue.value = 0;
                planePosition = 0;
                
                // 更新平面辅助器大小以适应模型
                scene.remove(planeHelper);
                const newPlaneHelper = new THREE.PlaneHelper(clippingPlane, radius * 2, 0xff0000);
                scene.add(newPlaneHelper);
                planeHelper = newPlaneHelper;
                
                updateClippingPlane();
                
                // 自动调整相机位置到tileset
                const fov = camera.fov * (Math.PI / 180);
                const cameraZ = Math.abs(radius / Math.tan(fov / 2));
                
                camera.position.set(0, radius * 0.5, cameraZ * 1.5);
                camera.lookAt(0, 0, 0);
                controls.target.set(0, 0, 0);
                controls.update();
            });

            tilesRenderer.addEventListener('load-tile-error', (event) => {
                updateStatus('加载错误: ' + (event.detail?.message || '未知错误'), 'error');
                console.error('Tile load error:', event.detail);
            });
            
            tilesRenderer.addEventListener('dispose-tile', () => {
                console.log('Tile disposed');
            });

            // 监听 tile 加载事件，为材质启用裁剪
            tilesRenderer.addEventListener('load-tile', (event) => {
                const tile = event.detail;
                if (tile && tile.content) {
                    // 遍历 tile 内容中的所有对象
                    tile.content.traverse((object) => {
                        if (object.isMesh && object.material) {
                            // 确保材质启用裁剪
                            if (Array.isArray(object.material)) {
                                object.material.forEach(mat => {
                                    mat.clippingPlanes = renderer.clippingPlanes;
                                });
                            } else {
                                object.material.clippingPlanes = renderer.clippingPlanes;
                            }
                        }
                    });
                }
            });

            // 动画循环
            function animate() {
                requestAnimationFrame(animate);

                // 更新tiles渲染器
                tilesRenderer.update();

                // 更新控制器
                controls.update();

                // 渲染场景
                renderer.render(scene, camera);
            }

            // 处理窗口大小变化
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                tilesRenderer.setResolutionFromRenderer(camera, renderer);
            });

            // 开始动画循环
            animate();
        }

        // 页面加载完成后初始化
        init();
    </script>
</body>
</html>
