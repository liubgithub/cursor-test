<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大冶产业一张图</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 顶部导航栏 -->
    <div class="navbar">
      <img src="素材/1.png" alt="大冶产业一张图" class="logo">
      <div class="nav-buttons">
        <img src="素材/2.png" alt="美丽大冶">
        <img src="素材/3.png" alt="区位优势">
        <img src="素材/4.png" alt="产业规划">
        <img src="素材/5.png" alt="历史沿革">
        <img src="素材/6.png" alt="自然禀赋">
      </div>
    </div>
    <!-- 地图背景 -->
    <div class="map-bg">
      <!-- 可在此处放置地图背景图片，如 <img src="素材/蒙版.png" alt="地图背景"> -->
    </div>
    <!-- 左侧菜单 -->
    <div class="sidebar">
      <img src="素材/弹框.png" alt="左侧菜单">
    </div>
    <!-- 右下角图例 -->
    <div class="legend">
      <img src="素材/小圆.png" alt="图例">
    </div>
  </div>
</body>
</html>
