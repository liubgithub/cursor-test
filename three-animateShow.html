<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Three.js Draw Tool - Sphere and Grid</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "./lib/three.module.js"
            }
        }
    </script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from './lib/OrbitControls.js';
    // 创建场景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeeeeee);

    // 创建相机
    const camera = new THREE.PerspectiveCamera(
        75, 
        window.innerWidth / window.innerHeight, 
        0.1, 
        1000
    );
    camera.position.set(0, 5, 10);

    // 创建渲染器
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 添加轨道控制器
    const controls = new OrbitControls(camera, renderer.domElement);

    // 添加网格辅助线
    const gridHelper = new THREE.GridHelper(20, 20);
    scene.add(gridHelper);

    // 创建球体
    const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
    const sphereMaterial = new THREE.MeshStandardMaterial({ color: 0x0077ff });
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    sphere.position.set(0, 1, 0); // 让球体在网格上方
    scene.add(sphere);

    // 添加光源
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7.5);
    scene.add(directionalLight);
    // 处理窗口大小变化
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 动画循环
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
    
    // 创建动画线条
    function createAnimatedLine() {
        // 定义线条的点
        const points = [
            new THREE.Vector3(-5, 0.1, -5),
            new THREE.Vector3(-2, 0.1, -3),
            new THREE.Vector3(0, 0.1, 0),
            new THREE.Vector3(2, 0.1, 3),
            new THREE.Vector3(5, 0.1, 5)
        ];
        
        // 创建线条几何体和材质
        const geometry = new THREE.BufferGeometry();
        const material = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 3 });
        
        // 创建空的位置数组
        const positions = new Float32Array(points.length * 3);
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        // 创建线条对象
        const line = new THREE.Line(geometry, material);
        scene.add(line);
        
        // 动画参数
        let animationProgress = 0;
        const animationDuration = 30000; // 3秒
        const startTime = Date.now();
        
        // 动画函数
        function animateLineShow() {
            const currentTime = Date.now();
            const elapsed = currentTime - startTime;
            animationProgress = Math.min(elapsed / animationDuration, 1);
            
            // 计算当前应该显示多少个点
            const totalPoints = points.length;
            const currentPointCount = Math.floor(animationProgress * totalPoints) + 1;
            
            // 如果是在两个点之间，计算插值
            if (animationProgress < 1) {
                const segmentProgress = (animationProgress * (totalPoints - 1)) % 1;
                const currentSegment = Math.floor(animationProgress * (totalPoints - 1));
                
                // 更新位置数组
                for (let i = 0; i < currentPointCount - 1; i++) {
                    const point = points[i];
                    positions[i * 3] = point.x;
                    positions[i * 3 + 1] = point.y;
                    positions[i * 3 + 2] = point.z;
                }
                
                // 添加插值点
                if (currentSegment < totalPoints - 1 && currentPointCount <= totalPoints) {
                    const startPoint = points[currentSegment];
                    const endPoint = points[currentSegment + 1];
                    const interpolatedPoint = new THREE.Vector3().lerpVectors(startPoint, endPoint, segmentProgress);
                    
                    const lastIndex = (currentPointCount - 1) * 3;
                    positions[lastIndex] = interpolatedPoint.x;
                    positions[lastIndex + 1] = interpolatedPoint.y;
                    positions[lastIndex + 2] = interpolatedPoint.z;
                }
                
                // 更新几何体
                geometry.setDrawRange(0, currentPointCount);
                geometry.attributes.position.needsUpdate = true;
                
                // 继续动画
                requestAnimationFrame(animateLineShow);
            } else {
                // 动画完成，显示完整线条
                for (let i = 0; i < points.length; i++) {
                    const point = points[i];
                    positions[i * 3] = point.x;
                    positions[i * 3 + 1] = point.y;
                    positions[i * 3 + 2] = point.z;
                }
                geometry.setDrawRange(0, points.length);
                geometry.attributes.position.needsUpdate = true;
            }
        }
        
        // 开始动画
        animateLineShow();
    }
    
    // 在场景加载完成后创建动画线条
    createAnimatedLine();
</script>
</body>
</html>
